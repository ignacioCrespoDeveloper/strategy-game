<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Realms — Age of Lords</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Persistent top bar (hidden until login) -->
  <div id="hud-bar" class="hidden"></div>

  <!-- All screens are rendered here by app.js -->
  <div id="screen-root"></div>

  <!-- Toast notifications (always present) -->
  <div id="toast-container"></div>

  <!-- Dev reset button (remove before shipping) -->
  <button id="dev-reset-btn" title="Wipe all saved data and restart"
    style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
           padding:0.4rem 0.8rem;font-size:0.72rem;font-weight:700;
           background:#3a1010;border:1px solid #8a2020;border-radius:6px;
           color:#e05050;cursor:pointer;opacity:0.7;letter-spacing:0.05em;"
    onmouseenter="this.style.opacity='1'"
    onmouseleave="this.style.opacity='0.7'"
    onclick="if(confirm('Wipe all saved data and restart?')){StorageService.clearAll();location.reload();}">
    ⚠ Reset Data
  </button>

  <!-- ── Core infrastructure ── -->
  <script src="js/core/time.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/events.js"></script>

  <!-- ── Data definitions ── -->
  <script src="js/data/races.js"></script>
  <script src="js/data/buildings.js"></script>
  <script src="js/data/discoveries.js"></script>
  <script src="js/data/lord-classes.js"></script>
  <script src="js/data/stances.js"></script>
  <script src="js/data/tags.js"></script>
  <script src="js/data/traits.js"></script>
  <script src="js/data/abilities.js"></script>
  <script src="js/data/units.js"></script>

  <!-- ── Domain services ── -->
  <script src="js/domain/player.js"></script>
  <script src="js/domain/lord.js"></script>
  <script src="js/domain/world.js"></script>
  <script src="js/domain/city.js"></script>
  <script src="js/domain/city-stats.js"></script>
  <script src="js/domain/events.js"></script>
  <script src="js/domain/building-unlock.js"></script>
  <script src="js/domain/construction.js"></script>
  <script src="js/domain/production.js"></script>
  <script src="js/domain/discovery.js"></script>
  <script src="js/domain/army.js"></script>
  <script src="js/domain/visibility.js"></script>
  <script src="js/domain/intelligence.js"></script>
  <script src="js/domain/recruitment.js"></script>
  <script src="js/domain/battle-history.js"></script>
  <script src="js/domain/activity.js"></script>

  <!-- ── Battle Engine ── -->
  <script src="js/data/battle-defs.js"></script>
  <script src="js/domain/battle-targeting.js"></script>
  <script src="js/domain/battle-morale.js"></script>
  <script src="js/domain/battle-traits.js"></script>
  <script src="js/domain/battle-engine.js"></script>

  <!-- ── UI views ── -->
  <script src="js/ui/auth-view.js"></script>
  <script src="js/ui/lord-view.js"></script>
  <script src="js/ui/map-view.js"></script>
  <script src="js/ui/city-view.js"></script>
  <script src="js/ui/lord-screen.js"></script>
  <script src="js/ui/overview-screen.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/battle-result-view.js"></script>

  <!-- ── App router (must load last) ── -->
  <script src="js/ui/app.js"></script>

</body>
</html>
