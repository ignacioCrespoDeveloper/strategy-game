<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hexfront — Strategy Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/panels.css" />
</head>
<body>
  <!-- HUD -->
  <header id="hud">
    <div id="hud-left">
      <div class="hud-logo">⚔ HEXFRONT</div>
      <div class="res-group">
        <div class="res-pill" title="Gold">💰 <span id="r-gold">0</span><span class="res-net" id="rn-gold"></span></div>
        <div class="res-pill" title="Iron">⚙️ <span id="r-iron">0</span><span class="res-net" id="rn-iron"></span></div>
        <div class="res-pill" title="Food">🌾 <span id="r-food">0</span><span class="res-net" id="rn-food"></span></div>
        <div class="res-pill" title="Wood">🌲 <span id="r-wood">0</span><span class="res-net" id="rn-wood"></span></div>
      </div>
    </div>
    <div id="hud-right">
      <div id="turn-display">Turn <span id="turn-num">1</span></div>
      <button id="end-turn-btn">End Turn ↵</button>
    </div>
  </header>

  <!-- Map: full screen below HUD -->
  <main id="layout">
    <div id="map-wrap">
      <canvas id="mapCanvas"></canvas>
    </div>
  </main>

  <!-- Bottom info panel — hidden when idle, slides up on selection -->
  <div id="bottom-panel">
    <div class="bp-frame">
      <button class="bp-close" onclick="Game.deselect()">✕</button>

      <!-- Unit panel (enemy view) -->
      <div id="panel-unit" class="panel-section">
        <div id="bp-unit-content"></div>
      </div>

      <!-- City panel -->
      <div id="panel-city" class="panel-section">
        <div id="bp-city-content"></div>
      </div>

      <!-- Army panel -->
      <div id="panel-group" class="panel-section">
        <div id="bp-army-content"></div>
      </div>
    </div>
  </div>

  <!-- Empire sidebar (top-right, cities + resource nodes) -->
  <div id="empire-panel"></div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Unit tooltip (fixed, shown on hover over unit cards) -->
  <div id="tw-tooltip"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/hex.js"></script>
  <script src="js/map.js"></script>
  <script src="js/units.js"></script>
  <script src="js/cities.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
