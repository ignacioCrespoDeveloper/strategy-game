<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hexfront — Strategy Game</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/panels.css" />
</head>
<body>
  <!-- HUD -->
  <header id="hud">
    <div id="hud-left">
      <div class="hud-logo">⚔ HEXFRONT</div>
      <div class="res-group">
        <div class="res-pill" title="Gold">💰 <span id="r-gold">0</span></div>
        <div class="res-pill" title="Iron">⚙️ <span id="r-iron">0</span></div>
        <div class="res-pill" title="Food">🌾 <span id="r-food">0</span></div>
        <div class="res-pill" title="Wood">🌲 <span id="r-wood">0</span></div>
      </div>
    </div>
    <div id="hud-right">
      <div id="turn-display">Turn <span id="turn-num">1</span></div>
      <button id="end-turn-btn">End Turn ↵</button>
    </div>
  </header>

  <!-- Map: full screen below HUD -->
  <main id="layout">
    <div id="map-wrap">
      <canvas id="mapCanvas"></canvas>
    </div>
  </main>

  <!-- Bottom info panel — hidden when idle, slides up on selection -->
  <div id="bottom-panel">
    <div class="bp-frame">
      <button class="bp-close" onclick="Game.deselect()">✕</button>

      <!-- Unit panel -->
      <div id="panel-unit" class="panel-section">
        <div class="bp-col bp-portrait" id="bp-unit-portrait"></div>
        <div class="bp-col bp-main"     id="bp-unit-stats"></div>
        <div class="bp-col bp-actions"  id="bp-unit-actions"></div>
      </div>

      <!-- City panel -->
      <div id="panel-city" class="panel-section">
        <div class="bp-col bp-portrait" id="bp-city-portrait"></div>
        <div class="bp-col bp-main"     id="bp-city-main"></div>
        <div class="bp-col bp-actions"  id="bp-city-actions"></div>
      </div>

      <!-- Army panel -->
      <div id="panel-group" class="panel-section">
        <div class="bp-col bp-portrait" id="bp-army-portrait"></div>
        <div class="bp-col bp-main"     id="bp-army-main"></div>
        <div class="bp-col bp-actions"  id="bp-army-actions"></div>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/hex.js"></script>
  <script src="js/map.js"></script>
  <script src="js/units.js"></script>
  <script src="js/cities.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
